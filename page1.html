            <h3>一、喂食次数</h3>
            <p>1. 幼犬：一日3-4餐，少食多餐，易消化吸收</p>
            <p>2. 成年犬：一日1-2餐即可，规律喂食</p>
            <p>3. 老年犬：软烂食物，少量多次喂食</p>

            <h3>二、适宜食物</h3>
            <p>主食：专用狗粮、小米粥、玉米面</p>
            <p>辅食：鸡胸肉、胡萝卜、西兰花、水煮鸡蛋</p>
            <p>饮品：常温白开水，拒绝冰水与饮料</p>

            <h3>三、绝对禁食食物</h3>
            <p>巧克力、葡萄、洋葱、大蒜、葱姜、含盐高的饭菜</p>
            <p>骨头类尖锐硬物容易划伤肠胃，尽量不要喂食</p>

            <h3>四、饮食小常识</h3>
            <p>定时定点喂食，不要随意投喂零食</p>
            <p>饭后半小时再进行运动，避免肠胃不适</p>
