            <h3>一、毛发护理</h3>
            <p>1. 每天梳理毛发，去除浮毛，防止打结</p>
            <p>2. 定期洗澡，夏季7-10天一次，冬季半个月一次</p>
            <p>3. 使用宠物专用沐浴露，禁止用人用洗护用品</p>

            <h3>二、身体清洁</h3>
            <p>1. 定期清理耳朵，预防耳螨发炎</p>
            <p>2. 修剪指甲，避免过长划伤家人与地面</p>
            <p>3. 清洁牙齿，减少口臭，预防牙结石</p>

            <h3>三、运动与作息</h3>
            <p>每天保证适量外出遛弯，释放精力增强体质</p>
            <p>保证充足睡眠，幼犬每日睡眠时间更长</p>

            <h3>四、健康防护</h3>
            <p>按时接种疫苗，定期体内外驱虫</p>
            <p>换季注意保暖防暑，避免着凉生病</p>

            <h3>五、居住环境</h3>
            <p>狗窝勤换洗暴晒，保持干净干燥</p>
            <p>生活区域定期打扫消毒，减少细菌滋生</p>
