<!doctype html>
<html>
<head>
<meta charset="utf-8"> 
<title>搜索框</title>
    
<style type="text/css">
        * {
            font-family: "微软雅黑";
        }
#father {
    width: 1000px;
    margin: 0 auto;
}
h1 {
    text-align: center;
    margin: 30px 0;
}
.index{
    display: flex;
    background: #afafad;
    margin-bottom: 30px;
}
.index-item{
    flex:1;
    text-align: center;
    padding:10px;
}
.index-item a{
    text-decoration: none;
    color:#11116;
}
.index-item a:hover{
    color:#ffffff;
    background-color: #26b1e3;
}
.content{
    font-size: 17px;
    line-height: 2.2;
    padding: 0 40px;
}
button {
    padding:6px 20px;
    cursor: pointer;
}
#showMsg p{
    padding:4px 0;
    border-bottom:1px solid #eee;
}
.search{
    padding:20px;
    border:1px solid #ccc;
    background:#f8f8f8;
}
</style>
</head>
<body>
<div id="father">
    <h1>狗狗搜索</h1>
<div class="index">
    <div class="index-item"><a href="index.html">首页</a></div>
    <div class="index-item"><a href="search.html">搜索框</a></div>
    <div class="index-item"><a href="liuyan.html">留言区</a></div>
</div>

<div class="search">
    <h3>搜索框</h3>
    <textarea id="lyText" rows="5" cols="80" placeholder="请输入：饮食 / 护理 / 疾病"></textarea>
    <br><br>
    <button onclick="searchGo()">提交搜索</button>
    <div id="showMsg">
        <p>搜索记录</p>
    </div>
</div>

</div>

<script>
// 搜索跳转核心功能
function searchGo(){
    let text = document.getElementById("lyText").value.trim();

    // 1. 空内容判断
    if(text == ""){
        alert("搜索不能为空");
        return;
    }

    // 2. 关键词匹配 + 跳转
    if(text == "饮食"){
        alert("找到：狗狗饮食，即将跳转");
        location.href = "page1.html"; //跳饮食页
    }
    else if(text == "护理"){
        alert("找到：日常护理，即将跳转");
        location.href = "page2.html"; //跳护理页
    }
    else if(text == "疾病"){
        alert("找到：常见疾病，即将跳转");
        location.href = "page3.html"; //跳疾病页
    }
    // 3. 无匹配关键词
    else{
        alert("无结果，请输入：饮食 / 护理 / 疾病");
    }

    // 清空输入框
    document.getElementById("lyText").value = "";
}
</script>
</body>
</html>
